services:
  wiki:
    cap_drop:
      - ALL
    image: ghcr.io/requarks/wiki:2
    ports:
      - mode: ingress
        protocol: tcp
        published: 3500
        target: 3000
    environment:
      - DB_TYPE=postgres
      - DB_HOST=postgresdb
      - DB_PORT=5432
      - DB_USER=$WIKI_POSTGRES_USER
      - DB_PASS=$WIKI_POSTGRES_PASSWORD
      - DB_NAME=$WIKI_POSTGRES_DATABASE
    privileged: False
    restart: unless-stopped
    security_opt:
      - no-new-privileges=true
    user: '568:568'
    volumes:
      - bind:
          create_host_path: False
          propagation: rprivate
        read_only: False
        source: /mnt/main/apps/wiki
        target: /wiki/data
        type: bind
    networks:
      - wiki-network
      - caddy-network
      - postgres-network
networks:
  wiki-network:
    name: wiki-network
  caddy-network:
    external: true
  postgres-network:
    external: true