services:
  gitea:
    cap_drop:
      - ALL
    environment:
      - GITEA__server__ROOT_URL=$GITEA_URL
      - GITEA__server__SSH_DOMAIN=$GITEA_SSH_DOMAIN
      - GITEA__server__DISABLE_SSH=false
      - GITEA__server__START_SSH_SERVER=true
      - GITEA__server__SSH_SERVER_USE_PROXY_PROTOCOL=false
      - GITEA__server__SSH_PORT=443
      - GITEA__server__SSH_LISTEN_PORT=2240
      - GITEA__database__DB_TYPE=postgres
      - GITEA__database__HOST=postgresdb:5432
      - GITEA__database__NAME=$GITEA_POSTGRES_DATABASE
      - GITEA__database__USER=$GITEA_POSTGRES_USER
      - GITEA__database__PASSWD=$GITEA_POSTGRES_PASSWORD
      - GITEA__mailer__ENABLED=true
      - GITEA__mailer__FROM=gitea@<your domain>
      - GITEA__mailer__PROTOCOL=smtps
      - GITEA__mailer__SMTP_ADDR=$RESEND_HOST
      - GITEA__mailer__SMTP_PORT=$RESEND_PORT
      - GITEA__mailer__USER=$RESEND_USER
      - GITEA__mailer__PASSWD=$RESEND_API_KEY
      - GITEA__oauth2_client__ENABLE_AUTO_REGISTRATION=true
      - GITEA__openid__ENABLE_OPENID_SIGNIN=false
      - GITEA__openid__ENABLE_OPENID_SIGNUP=false
    image: docker.gitea.com/gitea:1.26-rootless
    ports:
      - mode: ingress
        protocol: tcp
        published: 3000
        target: 3000
      - mode: ingress
        protocol: tcp
        published: 3002
        target: 2222
    privileged: False
    restart: unless-stopped
    security_opt:
      - no-new-privileges=true
    user: '568:568'
    volumes:
      - bind:
          create_host_path: False
          propagation: rprivate
        read_only: False
        source: /mnt/main/apps/gitea/data
        target: /var/lib/gitea
        type: bind
      - bind:
          create_host_path: False
          propagation: rprivate
        read_only: False
        source: /mnt/main/apps/gitea/config
        target: /etc/gitea
        type: bind
      - bind:
          create_host_path: False
          propagation: rprivate
        read_only: False
        source: /etc/timezone
        target: /etc/timezone:ro
        type: bind
      - bind:
          create_host_path: False
          propagation: rprivate
        read_only: False
        source: /etc/localtime
        target: /etc/localtime:ro
        type: bind
    networks:
      - gitea-network
      - postgres-network
      - caddy-network
networks:
  gitea-network:
    name: gitea-network
  postgres-network:
    external: true
  caddy-network:
    external: true